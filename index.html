<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My cool page</title>
  <link href="style.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

</head>

<body>

<div class="container">
  <div class="nav">
    <ul>
      <li><a href="">ply</a></li>
      <li><a href="">T-rex</a></li>
      <li><a href="Homepage.html">Home</a></li>
    </ul>
  </div>

  <div class="item2">header</div>

  <div class="carousel-wrapper">
    <div class="swiper">
      <div class="swiper-wrapper">

        <div class="swiper-slide">
          <img src="images/T-rexs.png" alt="T-rex">
          <div class="overlay"></div>
          <div class="overlay-text">Your text here</div>
        </div>

        <div class="swiper-slide">
          <img src="images/Pterodactyls.png" alt="Pterodactyl">
          <div class="overlay"></div>
          <div class="overlay-text">Pterodactyl</div>
        </div>

        <div class="swiper-slide">
          <img src="images/Anklosaurus.png" alt="Ankilosaurus">
          <div class="overlay"></div>
          <div class="overlay-text">Ankilosaurus</div>
        </div>

        <div class="swiper-slide">
          <img src="https://www.newport-water.com/wp-content/uploads/2025/09/20250919-232000-1620d60da110a840-9a7e108c-c05a-41c6-88d5-697a98bd3ae7-1024x574.jpeg" alt="Water Image 1">
          <div class="overlay"></div>
          <div class="overlay-text">Your text here</div>
        </div>

        <div class="swiper-slide">
          <img src="https://www.newport-water.com/wp-content/uploads/2025/09/20250919-232000-1620d60da110a840-9a7e108c-c05a-41c6-88d5-697a98dd3ae7-1024x574.jpeg" alt="Water Image 2">
          <div class="overlay"></div>
          <div class="overlay-text">Your text here</div>
        </div>

        <div class="swiper-slide">
          <img src="https://www.newport-water.com/wp-content/uploads/2025/09/20250919-232000-1620d60da110a840-9a7e108c-c05a-41c6-88d5-697a98bd3ae7-1024x574.jpeg" alt="Water Image 3">
          <div class="overlay"></div>
          <div class="overlay-text">Your text here</div>
        </div>

      </div>

      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>
  </div>

  <div class="footer">click for more information</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  const swiper = new Swiper('.swiper', {
    loop: true,
    slidesPerView: 1.4,
    centeredSlides: true,
    spaceBetween: 10,
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
    breakpoints: {
      0: {
        slidesPerView: 1,
        centeredSlides: false,
      },
      768: {
        slidesPerView: 1.4,
        centeredSlides: true,
      }
    }
  });
</script>
